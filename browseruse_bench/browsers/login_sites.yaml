# Built-in login site registry for `bubench login add <site>`.
#
# Groups are for readability; the runtime flattens into a {site_key: url} dict.
# Each key MUST equal what resolve_site_for_url() produces for that site's
# target_website — otherwise auto-injection at eval time will miss the entry.
#
# To add a new site: pick a stable site_key (what users will type after
# `bubench login add`), give it the canonical login URL, and (if its host has
# a subdomain that the heuristic can't derive — e.g. tieba.baidu.com → tieba)
# the reverse-lookup in login_contexts.py will still match it because the
# resolver consults this registry before falling back to the heuristic.

