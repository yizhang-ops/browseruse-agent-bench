# browseruse-bench configuration file
#
# Shared runtime config is intentionally flat:
#   runtime config = agents.<agent> + models.<model> + browsers.<browser>
# Select defaults globally with default.model/default.browser. Override per run
# with `--model` and `--browser-id`.

default:
  agent: browser-use
  data: LexBench-Browser
  model: gpt-5.4
  browser: lexmount
models:
  # Browser Use official hosted model. Only supported by the browser-use agent.
  browser-use:
    model_type: BROWSER_USE
    model_id: bu-2-0
    api_key: $BROWSER_USE_API_KEY

  # OpenAI GPT family through the OpenAI-compatible gateway.
  gpt-5.4:
    model_type: OPENAI
    model_provider: openai
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    dont_force_structured_output: false
    add_schema_to_system_prompt: true

  # Anthropic Claude family, proxied as an OpenAI-compatible model.
  claude-opus-4.8:
    model_type: OPENAI
    model_provider: openai
    model_id: openrouter/claude-opus-4.8
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: true
    add_schema_to_system_prompt: true
    claude_thinking: true
    claude_reasoning_effort: high

  # Google Gemini family.
  gemini-3.5-flash:
    model_type: OPENAI
    model_provider: openai
    model_id: gemini-3.5-flash
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: false
    add_schema_to_system_prompt: true

  # Qwen family.
  qwen3.7-max:
    model_type: OPENAI
    model_provider: openai
    model_id: qwen3.7-max
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: false
    add_schema_to_system_prompt: true

  # Moonshot Kimi family.
  kimi-k2.6:
    model_type: OPENAI
    model_provider: openai
    model_id: kimi-k2.6
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    temperature: 1.0
    frequency_penalty: 0
    remove_min_items_from_schema: true
    remove_defaults_from_schema: true
    dont_force_structured_output: true
    add_schema_to_system_prompt: true

  # MiniMax family.
  minimax-m3:
    model_type: OPENAI
    model_provider: openai
    model_id: MiniMax-M3
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: false
    add_schema_to_system_prompt: true

  # ByteDance Doubao family.
  doubao-seed-pro:
    model_type: OPENAI
    model_provider: openai
    model_id: doubao-seed-2-0-pro
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: true
    add_schema_to_system_prompt: true

  # Zhipu GLM.
  glm-5.1:
    model_type: OPENAI
    model_provider: openai
    model_id: glm-5.1
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: false
    add_schema_to_system_prompt: true

  # DeepSeek family.
  deepseek-v4-pro:
    model_type: OPENAI
    model_provider: openai
    model_id: deepseek-v4-pro
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
    dont_force_structured_output: false
    add_schema_to_system_prompt: true

  openrouter:
    model_type: OPENROUTER
    model_id: openai/gpt-5.4
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1/chat/completions
  # Codex CLI model. Only supported by the codex agent. Auth, either:
  #  - ChatGPT login (`codex login`, an auth.json) and no base_url, OR
  #  - an api_key + base_url pointing at an endpoint that serves the OpenAI
  #    Responses API (codex ignores OPENAI_BASE_URL, so base_url is wired via a
  #    model provider with wire_api="responses"; codex >=0.139 dropped "chat",
  #    so a chat-only proxy will NOT work). The model_id must be deployed there.
  codex:
    model_type: OPENAI
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
  # Cursor CLI model. Only supported by the cursor agent; model calls are
  # routed through Cursor's backend, so auth is `cursor-agent login` or
  # CURSOR_API_KEY (a Cursor key, not an OpenAI key). model_id must be a
  # Cursor-hosted model id (run `cursor-agent --list-models`); there is no
  # BYOK, so a proxy/OpenAI model id will be rejected. To test a model not
  # listed here without adding an entry, pass it through directly, e.g.
  # `bubench run --agent cursor --model claude-opus-4-8-high`.
  cursor:
    model_type: OPENAI
    model_id: gpt-5.2
    api_key: $CURSOR_API_KEY
  # OpenClaw CLI model. Only supported by the openclaw agent; the agent writes
  # a per-task OpenClaw provider config from these values (OpenAI-compatible
  # endpoints work, e.g. a LiteLLM proxy).
  openclaw:
    model_type: OPENAI
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    # Optional provider tuning, forwarded into the per-task OpenClaw config:
    # api: openai-responses          # provider wire API (default: openai-completions)
    # reasoning: true                # mark the model as a reasoning model
    # supports_reasoning_effort: true
    # thinking: medium               # OpenClaw --thinking level (off|minimal|low|medium|high|xhigh)
browsers:
  lexmount:
    browser_id: lexmount
    lexmount_browser_mode: normal
    lexmount_official_proxy: false
    lexmount_api_key: $LEXMOUNT_API_KEY
    lexmount_project_id: $LEXMOUNT_PROJECT_ID
    # lexmount_base_url: $LEXMOUNT_BASE_URL
    # Optional per-region profiles. Keys match task.website_region and are used
    # for routing sessions and saved login contexts.
    lexmount_profiles:
      zh:
        api_key: $LEXMOUNT_API_KEY_ZH
        project_id: $LEXMOUNT_PROJECT_ID_ZH
        base_url: $LEXMOUNT_BASE_URL_ZH
      en:
        api_key: $LEXMOUNT_API_KEY_EN
        project_id: $LEXMOUNT_PROJECT_ID_EN
        base_url: $LEXMOUNT_BASE_URL_EN
    # Optional proxy for lexmount sessions.
    # lexmount_proxy_server: http://1.2.3.4:8080
    # lexmount_proxy_type: external
    # lexmount_proxy_username: your_username
    # lexmount_proxy_password: your_password
  local:
    browser_id: local
    headless: false
    local_proxy_server: ''
  browser-use-cloud:
    browser_id: browser-use-cloud
    browser_use_cloud_profile_id: your_profile_id
    browser_use_cloud_proxy_country_code: US
    browser_use_cloud_timeout: 5
  skyvern-cloud:
    browser_id: skyvern-cloud
    proxy_location: RESIDENTIAL
  agentbay:
    browser_id: agentbay
    agentbay_api_key: $AGENTBAY_API_KEY
    agentbay_image_id: browser_latest
    agentbay_enable_browser_replay: true
    agentbay_browser_use_stealth: false
  browserbase:
    browser_id: browserbase
    browserbase_api_key: $BROWSERBASE_API_KEY
    browserbase_project_id: $BROWSERBASE_PROJECT_ID
    browserbase_region: us-west-2
    browserbase_timeout: 600
    browserbase_keep_alive: false
  browserless:
    browser_id: browserless
    browserless_token: $BROWSERLESS_TOKEN
    browserless_ws_url: wss://production-sfo.browserless.io
    browserless_browser_path: ''
  steel:
    browser_id: steel
    steel_api_key: $STEEL_API_KEY
    steel_region: iad
    steel_timeout: 600000
    steel_use_proxy: false
    steel_solve_captcha: false
    steel_block_ads: false
  cdp:
    browser_id: cdp
    CDP_ADDRESS: http://localhost:9222
agents:
  browser-use:
    use_judge: false
    use_vision: false
    max_steps: 40
    flash_mode: true
    timeout: 600
  skyvern:
    engine: skyvern_v2
    max_steps: 50
    timeout: 600
    max_screenshot_scrolls: 5
    include_action_history_in_verification: true
    max_consecutive_repeats: 3
    max_action_occurrences: 5
    enable_openai_compatible: true
    # Default: ignore inherited DATABASE_STRING and use a temporary PostgreSQL DB.
    # Set database_string only when you want a managed/persistent Skyvern database.
    # database_string: postgresql+psycopg://skyvern@localhost/skyvern
  claude-code:
    # Override the global default model so claude-code uses the Claude example.
    active_model: claude-opus-4.8
    active_browser: lexmount
    max_turns: 50
    timeout: 300
    # Segment wildcard (mcp__playwright__*); a trailing wildcard is rejected.
    allowed_tools: mcp__playwright__*
  codex:
    active_model: codex
    timeout: 600
    sandbox_mode: read-only
  cursor:
    active_model: cursor
    timeout: 600
  openclaw:
    active_model: openclaw
    timeout: 600
  deepbrowse:
    use_vision: auto
    max_steps: 50
    max_action_history_steps: 10
    keep_last_n_rounds: 0
    enable_dom_retry: false
    disable_security: true
    enable_api_tool: false
    enable_network_recording: true
    debug_artifacts: true
    timeout: 600
  webwright:
    max_steps: 100
    timeout: 600
    request_timeout_seconds: 120
  Agent-TARS:
    browser_control: hybrid
    timeout: 300
    max_turns: 50
# Site-skills prompt injection (agent-agnostic). When enabled, `bubench run`
# matches each task's declared target site against the per-site skill library
# and appends the matched markdown files to the task prompt. Override per run
# with `--site-skills on|off`. Matching mirrors browser-harness domain-skills
# (hostname / dotted suffix / single label, `.-_` ignored, `hosts` aliases).
site_skills:
  enabled: false
  # Skill library root; relative paths resolve against the repo root. The
  # default is the vendored, versioned copy (see its VERSION.md) so runs
  # depend on a static skill snapshot rather than a live external checkout.
  dir: browseruse_bench/agents/site_skills/domain-skills
  # Budget for the injected section per task, in characters.
  max_chars: 30000
  # Cap on matched skill files injected per task.
  max_files: 10
eval:
  model: gpt-5.4
  api_key: $OPENAI_API_KEY
  base_url: $OPENAI_BASE_URL
  temperature: 1.0
  max_tries: 5
  # Max images per judge request; 0 = text-only judge (LexBench eval omits screenshots).
  api_max_images: 50
  detail: high
  max_tokens: 4096
leaderboard:
  default_timeout_seconds: 300
  regenerate_timeout_seconds: 300
service:
  name: benchmark-server
  description: BrowserUse Bench Leaderboard Server
  user: ubuntu
  group: ubuntu
  host: 0.0.0.0
  port: 8000
  log_path: /var/log/browseruse_bench/benchmark_server.log
  restart_sec: 10
  limit_nofile: 65535
