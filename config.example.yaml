# browseruse-bench configuration file
#
# Shared runtime config is intentionally flat:
#   runtime config = agents.<agent> + models.<model> + browsers.<browser>
# Select defaults globally with default.model/default.browser. Override per run
# with `--model` and `--browser-id`.

default:
  agent: browser-use
  data: LexBench-Browser
  model: gpt-5.4
  browser: lexmount
models:
  # Browser Use official hosted model. Only supported by the browser-use agent.
  browser-use:
    model_type: BROWSER_USE
    model_id: bu-2-0
    api_key: $BROWSER_USE_API_KEY
  gpt-5.4:
    model_type: OPENAI
    model_provider: openai
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
  qwen-plus:
    model_type: OPENAI
    model_provider: openai
    model_id: qwen3.5-plus
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    dont_force_structured_output: true
    add_schema_to_system_prompt: true
    max_tokens: 16000
    temperature: 0.0
    request_timeout: 600
  kimi-k2.5:
    model_type: OPENAI
    model_id: kimi-k2.5
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    temperature: 1.0
    frequency_penalty: 0
    remove_min_items_from_schema: true
    remove_defaults_from_schema: true
    add_schema_to_system_prompt: true
  minimax-m2.5:
    model_type: OPENAI
    model_id: MiniMax-M2.5
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    dont_force_structured_output: true
    add_schema_to_system_prompt: true
  doubao-seed:
    model_type: AZURE
    model_id: doubao-seed-2-0-pro
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
  claude-sonnet:
    model_type: OPENAI
    model_id: claude-sonnet-4-6
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    dont_force_structured_output: true
    add_schema_to_system_prompt: true
  gemini-2.5-pro:
    model_type: OPENAI
    model_id: gemini-2.5-pro
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
  gpt-5-mini:
    model_type: OPENAI
    model_id: gpt-5-mini
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
  gemini-3-pro-preview:
    model_type: OPENAI
    model_id: gemini-3.1-pro-preview
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    frequency_penalty: null
  gemini:
    model_type: OPENAI
    model_provider: openai
    model_id: gemini-3.1-pro-preview
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    supports_vision: true
    max_tokens: 16000
    temperature: 0.0
    request_timeout: 600
  gpt:
    model_type: OPENAI
    model_provider: openai
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    supports_vision: true
    temperature: 1.0
    max_tokens: 16000
    request_timeout: 600
  claude:
    model_type: OPENAI
    model_provider: openai
    model_id: dmx-claude-sonnet-4-6
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    supports_vision: true
    max_tokens: 16000
    temperature: 0.0
    request_timeout: 600
  minimax:
    model_type: OPENAI
    model_provider: openai
    model_id: MiniMax-M2.5
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    supports_vision: true
    max_tokens: 16000
    temperature: 0.0
    request_timeout: 600
  kimi:
    model_type: OPENAI
    model_provider: openai
    model_id: kimi-k2.5
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    supports_vision: false
    temperature: 1.0
    frequency_penalty: 0
    remove_min_items_from_schema: true
    remove_defaults_from_schema: true
    add_schema_to_system_prompt: true
    max_tokens: 16000
    request_timeout: 600
  glm-5:
    model_type: OPENAI
    model_provider: openai
    model_id: glm-5
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    supports_vision: true
    max_tokens: 16000
    temperature: 0.0
    request_timeout: 600
  sonnet:
    model_id: claude-sonnet-4-6
    api_key: $ANTHROPIC_API_KEY
  opus:
    model_id: claude-opus-4-6
    api_key: $ANTHROPIC_API_KEY
  openrouter:
    model_type: OPENROUTER
    model_id: openai/gpt-5.4
    api_key: $OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1/chat/completions
  # Codex CLI model. Only supported by the codex agent. Auth, either:
  #  - ChatGPT login (`codex login`, an auth.json) and no base_url, OR
  #  - an api_key + base_url pointing at an endpoint that serves the OpenAI
  #    Responses API (codex ignores OPENAI_BASE_URL, so base_url is wired via a
  #    model provider with wire_api="responses"; codex >=0.139 dropped "chat",
  #    so a chat-only proxy will NOT work). The model_id must be deployed there.
  codex:
    model_type: OPENAI
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
  # Cursor CLI models. Only supported by the cursor agent; model calls are
  # routed through Cursor's backend, so auth is `cursor-agent login` or
  # CURSOR_API_KEY (a Cursor key, not an OpenAI key). model_id must be a
  # Cursor-hosted model id (run `cursor-agent --list-models`); there is no
  # BYOK, so a proxy/OpenAI model id will be rejected. To test a model not
  # listed here without adding an entry, pass it through directly, e.g.
  # `bubench run --agent cursor --model claude-opus-4-8-high`.
  cursor:
    model_type: OPENAI
    model_id: gpt-5.2
    api_key: $CURSOR_API_KEY
  cursor-gpt-5.5:
    model_type: OPENAI
    model_id: gpt-5.5-high
    api_key: $CURSOR_API_KEY
  cursor-fable:
    model_type: OPENAI
    model_id: claude-fable-5-thinking-high
    api_key: $CURSOR_API_KEY
  cursor-opus:
    model_type: OPENAI
    model_id: claude-opus-4-8-high
    api_key: $CURSOR_API_KEY
  # OpenClaw CLI model. Only supported by the openclaw agent; the agent writes
  # a per-task OpenClaw provider config from these values (OpenAI-compatible
  # endpoints work, e.g. a LiteLLM proxy).
  openclaw:
    model_type: OPENAI
    model_id: gpt-5.4
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
browsers:
  lexmount:
    browser_id: lexmount
    lexmount_browser_mode: normal
    lexmount_api_key: $LEXMOUNT_API_KEY
    lexmount_project_id: $LEXMOUNT_PROJECT_ID
  local:
    browser_id: local
    headless: false
    local_proxy_server: ''
  browser-use-cloud:
    browser_id: browser-use-cloud
    browser_use_cloud_profile_id: your_profile_id
    browser_use_cloud_proxy_country_code: US
    browser_use_cloud_timeout: 5
  skyvern-cloud:
    browser_id: skyvern-cloud
    proxy_location: RESIDENTIAL
  agentbay:
    browser_id: agentbay
    agentbay_api_key: $AGENTBAY_API_KEY
    agentbay_image_id: browser_latest
    agentbay_enable_browser_replay: true
    agentbay_browser_use_stealth: false
  browserbase:
    browser_id: browserbase
    browserbase_api_key: $BROWSERBASE_API_KEY
    browserbase_project_id: $BROWSERBASE_PROJECT_ID
    browserbase_region: us-west-2
    browserbase_timeout: 600
    browserbase_keep_alive: false
  browserless:
    browser_id: browserless
    browserless_token: $BROWSERLESS_TOKEN
    browserless_ws_url: wss://production-sfo.browserless.io
    browserless_browser_path: ''
  steel:
    browser_id: steel
    steel_api_key: $STEEL_API_KEY
    steel_region: iad
    steel_timeout: 600000
    steel_use_proxy: false
    steel_solve_captcha: false
    steel_block_ads: false
  cdp:
    browser_id: cdp
    CDP_ADDRESS: http://localhost:9222
agents:
  browser-use:
    use_judge: false
    use_vision: false
    max_steps: 40
    flash_mode: true
    timeout: 600
  skyvern:
    engine: skyvern_v2
    max_steps: 50
    timeout: 600
    max_screenshot_scrolls: 5
    include_action_history_in_verification: true
    max_consecutive_repeats: 3
    max_action_occurrences: 5
    enable_openai_compatible: true
    # Default: ignore inherited DATABASE_STRING and use a temporary PostgreSQL DB.
    # Set database_string only when you want a managed/persistent Skyvern database.
    # database_string: postgresql+psycopg://skyvern@localhost/skyvern
  claude-code:
    # claude-code needs an Anthropic model (api_key=$ANTHROPIC_API_KEY); without
    # active_model it would inherit default.model (an OpenAI entry) and fail auth.
    active_model: sonnet
    active_browser: lexmount
    max_turns: 50
    timeout: 300
    # Segment wildcard (mcp__playwright__*); a trailing wildcard is rejected.
    allowed_tools: mcp__playwright__*
  codex:
    active_model: codex
    timeout: 600
    sandbox_mode: read-only
  cursor:
    active_model: cursor
    timeout: 600
  openclaw:
    active_model: openclaw
    timeout: 600
  deepbrowse:
    use_vision: auto
    max_steps: 50
    max_action_history_steps: 10
    keep_last_n_rounds: 0
    enable_dom_retry: false
    disable_security: true
    enable_api_tool: false
    enable_network_recording: true
    debug_artifacts: true
    timeout: 600
  webwright:
    max_steps: 100
    timeout: 600
    request_timeout_seconds: 120
  Agent-TARS:
    browser_control: hybrid
    timeout: 300
    max_turns: 50
eval:
  model: gpt-5.4
  api_key: $OPENAI_API_KEY
  base_url: $OPENAI_BASE_URL
  temperature: 1.0
  max_tries: 5
  api_max_images: 50
  detail: high
  max_tokens: 512
leaderboard:
  default_timeout_seconds: 300
  regenerate_timeout_seconds: 300
service:
  name: benchmark-server
  description: BrowserUse Bench Leaderboard Server
  user: ubuntu
  group: ubuntu
  host: 0.0.0.0
  port: 8000
  log_path: /var/log/browseruse_bench/benchmark_server.log
  restart_sec: 10
  limit_nofile: 65535
