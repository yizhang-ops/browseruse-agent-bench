name: Publish to GHCR

on:
  push:
    branches:
      - 'main'
      - 'test/**'
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=dev-latest,enable=${{ github.ref_name != 'main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            INSTALL_CLI_AGENTS=true

      - name: Trigger Kestra image warmup via bench webhook (best-effort)
        # The bench platform (bench.lexmount.com) forwards this to Kestra's
        # lex/lex-browser-image-warmup flow. Auth is a shared Bearer secret
        # (IMAGE_WARMUP_WEBHOOK_SECRET) configured both in this repo's Actions
        # secrets and in the platform's deployment env; the platform returns
        # 401 until both sides share the same value. Best-effort
        # (continue-on-error) so a failed webhook never blocks CI. Note: the
        # warmup flow currently has ONLY a webhook trigger (no schedule
        # fallback), so a skipped or failed webhook leaves the image un-warmed
        # until the next successful build webhook.
        continue-on-error: true
        shell: bash
        env:
          IMAGE_WARMUP_WEBHOOK_SECRET: ${{ secrets.IMAGE_WARMUP_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${IMAGE_WARMUP_WEBHOOK_SECRET:-}" ]; then
            echo "IMAGE_WARMUP_WEBHOOK_SECRET not configured; skipping warmup."
            echo "The warmup flow has no schedule fallback, so the image will be"
            echo "warmed only on the next build that sends this webhook."
            exit 0
          fi

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            docker_image_tag="latest"
          else
            docker_image_tag="dev-latest"
          fi
          echo "Warmup target tag: ${docker_image_tag}"

          # -o /dev/null: never print the response body - the platform echoes
          # execution trigger details that can contain internal credentials,
          # and these logs are public.
          http_code=$(curl -sS -o /dev/null -w "%{http_code}" \
            --max-time 10 --retry 1 --retry-delay 2 -X POST \
            "https://bench.lexmount.com/api/webhooks/image-warmup" \
            -H "Authorization: Bearer ${IMAGE_WARMUP_WEBHOOK_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"docker_image_tag\": \"${docker_image_tag}\"}")
          if [ "${http_code}" != "200" ]; then
            echo "Warmup webhook failed: HTTP ${http_code}"
            exit 1
          fi
          echo "Warmup webhook triggered successfully (HTTP ${http_code})."
